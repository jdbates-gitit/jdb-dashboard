name: Dashboard Auto-Deploy

on:
  schedule:
    # CDT (summer, UTC-5): 6AM CT = 11 UTC, 12PM CT = 17 UTC
    - cron: '0 11 * * *'
    - cron: '0 17 * * *'
    # CST (winter, UTC-6): 6AM CT = 12 UTC, 12PM CT = 18 UTC
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
    # All four fire year-round; the Python time-gate runs work only at 6AM/12PM CT.
  workflow_dispatch:         # allows manual trigger from GitHub

permissions:
  contents: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dashboard script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RUN_NOW: ${{ github.event_name == 'workflow_dispatch' && '1' || '0' }}
        run: python ai_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config --global user.email "jdbates@gmail.com"
          git config --global user.name "jdbates-gitit"
          git add index.html run_state.json
          git diff --staged --quiet || git commit -m "auto-update dashboard"
          git push
